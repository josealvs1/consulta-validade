<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de Validade</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 0 14px rgba(0,0,0,0.10);
    }

    h1 {
      text-align: center;
      color: #222;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 20px;
      box-sizing: border-box;
    }

    .card {
      text-align: center;
      border-top: 1px solid #ddd;
      padding-top: 20px;
    }

    .card img {
      max-width: 240px;
      max-height: 240px;
      object-fit: contain;
      margin-bottom: 18px;
    }

    .info {
      font-size: 18px;
      margin: 10px 0;
    }

    .validade {
      font-size: 22px;
      font-weight: bold;
      margin-top: 15px;
    }

    .verde {
      color: green;
      font-weight: bold;
    }

    .amarelo {
      color: #c58b00;
      font-weight: bold;
    }

    .vermelho {
      color: red;
      font-weight: bold;
    }

    .vazio {
      text-align: center;
      color: #777;
      font-size: 16px;
      margin-top: 20px;
    }

    .erro-img {
      width: 220px;
      height: 160px;
      margin: auto;
      margin-bottom: 18px;
      background: #eee;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #777;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Consulta de Validade</h1>

    <input 
      type="text" 
      id="pesquisa" 
      placeholder="Digite o código do produto"
      autocomplete="off"
    >

    <div id="resultado" class="vazio">
      Digite um código para consultar.
    </div>
  </div>

  <script>
    const urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRdmEiwdSbn1xH8WD7AeUy5Z2_Zc31eS9BLtoCZkqM7DPCNAmCM1sANGA0OEgo3sUPBjYM9AowLhHku/pub?gid=0&single=true&output=csv";

    let dados = [];

    function converterDataBR(data) {
      const partes = data.split("/");
      return new Date(partes[2], partes[1] - 1, partes[0]);
    }

    function calcularStatus(validade) {
      const hoje = new Date();
      hoje.setHours(0, 0, 0, 0);

      const dataValidade = converterDataBR(validade);
      const dias = Math.ceil((dataValidade - hoje) / (1000 * 60 * 60 * 24));

      if (dias <= 30) {
        return { texto: "Crítico", classe: "vermelho", dias };
      } else if (dias <= 60) {
        return { texto: "Atenção", classe: "amarelo", dias };
      } else {
        return { texto: "Saudável", classe: "verde", dias };
      }
    }

    function carregarImagem(codigo, produto) {
      const formatos = ["jpg", "jpeg", "png", "JPG", "JPEG", "PNG"];
      let indice = 0;
    
      const img = document.createElement("img");
      img.alt = produto;
    
      function tentarProxima() {
        if (indice >= formatos.length) {
          const div = document.createElement("div");
          div.className = "erro-img";
          div.innerText = "Imagem não disponível";
          img.replaceWith(div);
          return;
        }
    
        img.src = `imagens/${codigo}.${formatos[indice]}`;
        indice++;
      }
    
      img.onerror = tentarProxima;
    
      tentarProxima();
    
      return img;
    }

    function carregarDados() {
      fetch(urlCSV)
        .then(response => response.text())
        .then(csv => {
          const linhas = csv.trim().split("\n").map(linha => linha.split(","));

          dados = linhas.slice(1).map(linha => ({
            codigo: linha[0]?.trim(),
            produto: linha[1]?.trim(),
            validade: linha[2]?.trim()
          }));
        })
        .catch(() => {
          document.getElementById("resultado").innerHTML =
            "Erro ao carregar a base de dados.";
        });
    }

    document.getElementById("pesquisa").addEventListener("input", function() {
      const codigo = this.value.trim();
      const resultado = document.getElementById("resultado");

      if (!codigo) {
        resultado.innerHTML = "Digite um código para consultar.";
        resultado.className = "vazio";
        return;
      }

      const item = dados.find(produto => produto.codigo === codigo);

      if (!item) {
        resultado.innerHTML = "Nenhum produto encontrado.";
        resultado.className = "vazio";
        return;
      }

      const status = calcularStatus(item.validade);

      resultado.className = "card";
      resultado.innerHTML = "";

      const imagem = carregarImagem(item.codigo, item.produto);
      resultado.appendChild(imagem);

      resultado.innerHTML += `
        <div class="info"><strong>Código:</strong> ${item.codigo}</div>
        <div class="info"><strong>Produto:</strong> ${item.produto}</div>
        <div class="validade"><strong>Validade:</strong> ${item.validade}</div>
        <div class="info"><strong>Dias para vencer:</strong> ${status.dias}</div>
        <div class="info ${status.classe}"><strong>Status:</strong> ${status.texto}</div>
      `;
    });

    carregarDados();
  </script>

</body>
</html>
